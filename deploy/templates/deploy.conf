# ── App identity ─────────────────────────────────────────────────────────────
APP_NAME="my-app"                                     # kebab-case; used for dirs, images, containers
REPO="git@github.com:sanhup/my-app.git"              # SSH clone URL

# ── Build type ───────────────────────────────────────────────────────────────
# backend | frontend | both
BUILD_TYPE="both"

# ── Shared repos ─────────────────────────────────────────────────────────────
# Space-separated SSH repo URLs cloned into apps/backend/shared_libs/ before build.
# Leave empty if none.
SHARED_REPOS=""
# SHARED_REPOS="git@github.com:sanhup/solvista-i18n.git"

# ── Server ───────────────────────────────────────────────────────────────────
SERVER="root@157.90.154.103"
SSH_KEY="../../.ssh/solvista_id_rsa"                 # Relative to this project's deploy/ dir

# ── Frontend build args (baked into JS bundle at build time) ─────────────────
# All VITE_ vars below are automatically passed as --build-arg to podman build.
# VITE_API_BASE="https://api.solvista.nl/my-app"

# ── Container names (auto-derived — only change if you customized compose) ───
APP_SLUG="${APP_NAME//-/_}"
POSTGRES_CONTAINER="${APP_SLUG}_postgres"
BACKEND_CONTAINER="${APP_SLUG}_backend"
INIT_CONTAINER="${APP_SLUG}_init"
